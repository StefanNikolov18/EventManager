spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/EventManager
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Liquibase owns the schema — do NOT let Hibernate create/alter tables.
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: events
        format_sql: true
    show-sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: events